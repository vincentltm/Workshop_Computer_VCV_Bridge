<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 71.12 128.5" width="71.12mm" height="128.5mm">
  <!-- Background -->
  <rect width="71.12" height="128.5" fill="#0f0f1a"/>

  <!-- Mounting holes visual guides (for reference only, VCV adds real screws) -->

  <!-- Header band -->
  <rect x="0" y="0" width="71.12" height="20" fill="#1a1a3e" opacity="0.8"/>

  <!-- Title -->
  <text x="35.56" y="8.5" text-anchor="middle"
        font-family="monospace" font-size="4.2" font-weight="bold"
        fill="#7ec8e3" letter-spacing="1">VCV BRIDGE</text>
  <text x="35.56" y="13.5" text-anchor="middle"
        font-family="monospace" font-size="2.8"
        fill="#4a7a9b" letter-spacing="0.5">MUSIC THING MODULAR</text>

  <!-- Status dots area (lights added by C++) -->
  <text x="23" y="16" font-family="monospace" font-size="2.5" fill="#555">STS RX TX</text>

  <!-- ── FROM HARDWARE section ─────────────────────────────────────────── -->
  <rect x="2" y="22" width="67.12" height="59" rx="2" fill="#0a1a2e" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="35.56" y="27" text-anchor="middle"
        font-family="monospace" font-size="2.8" fill="#7ec8e3">FROM HARDWARE</text>

  <!-- Row labels -->
  <text x="5" y="36.5" font-family="monospace" font-size="2.2" fill="#4a7a9b">AUD</text>
  <text x="9.5" y="38.5" text-anchor="middle" font-family="monospace" font-size="1.8" fill="#7ec8e3">1</text>
  <text x="21.5" y="38.5" text-anchor="middle" font-family="monospace" font-size="1.8" fill="#7ec8e3">2</text>

  <text x="5" y="50.5" font-family="monospace" font-size="2.2" fill="#4a7a9b">CV</text>
  <text x="9.5" y="52.5" text-anchor="middle" font-family="monospace" font-size="1.8" fill="#7ec8e3">1</text>
  <text x="21.5" y="52.5" text-anchor="middle" font-family="monospace" font-size="1.8" fill="#7ec8e3">2</text>

  <text x="5" y="64.5" font-family="monospace" font-size="2.2" fill="#4a7a9b">PLS</text>
  <text x="9.5" y="66.5" text-anchor="middle" font-family="monospace" font-size="1.8" fill="#7ec8e3">1</text>
  <text x="21.5" y="66.5" text-anchor="middle" font-family="monospace" font-size="1.8" fill="#7ec8e3">2</text>

  <!-- Knob row labels -->
  <text x="6.5"  y="79.5" text-anchor="middle" font-family="monospace" font-size="1.8" fill="#a0c4ff">M</text>
  <text x="17.5" y="79.5" text-anchor="middle" font-family="monospace" font-size="1.8" fill="#a0c4ff">X</text>
  <text x="27.5" y="79.5" text-anchor="middle" font-family="monospace" font-size="1.8" fill="#a0c4ff">Y</text>
  <text x="37.5" y="79.5" text-anchor="middle" font-family="monospace" font-size="1.8" fill="#a0c4ff">SW</text>

  <!-- Divider line between sections -->
  <line x1="4" y1="84" x2="67.12" y2="84" stroke="#1e3a5f" stroke-width="0.5"/>

  <!-- ── TO HARDWARE section ──────────────────────────────────────────── -->
  <rect x="2" y="86" width="67.12" height="40" rx="2" fill="#1a0a0a" stroke="#5f1e1e" stroke-width="0.5"/>
  <text x="35.56" y="91" text-anchor="middle"
        font-family="monospace" font-size="2.8" fill="#e37c7c">TO HARDWARE</text>

  <text x="5" y="99.5"  font-family="monospace" font-size="2.2" fill="#7a4a4a">AUD</text>
  <text x="9.5"  y="101" text-anchor="middle" font-family="monospace" font-size="1.8" fill="#e37c7c">1</text>
  <text x="21.5" y="101" text-anchor="middle" font-family="monospace" font-size="1.8" fill="#e37c7c">2</text>

  <text x="5" y="113.5" font-family="monospace" font-size="2.2" fill="#7a4a4a">CV</text>
  <text x="9.5"  y="115" text-anchor="middle" font-family="monospace" font-size="1.8" fill="#e37c7c">1</text>
  <text x="21.5" y="115" text-anchor="middle" font-family="monospace" font-size="1.8" fill="#e37c7c">2</text>

  <text x="5" y="127.5" font-family="monospace" font-size="2.2" fill="#7a4a4a">PLS</text>
  <text x="9.5"  y="128.5" text-anchor="middle" font-family="monospace" font-size="1.8" fill="#e37c7c">1</text>
  <text x="21.5" y="128.5" text-anchor="middle" font-family="monospace" font-size="1.8" fill="#e37c7c">2</text>
</svg>
