<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  VCV Bridge panel — Music Thing Modular aesthetic
  Coordinate system: mm  (matches mm2px() calls in C++)
  Size: 14HP = 71.12 × 128.5 mm

  Port positions (all in mm, matching VCVBridge.cpp):
    FROM HARDWARE (outputs, left columns x=11, x=22):
      AUD 1/2  y=30    CV 1/2  y=47    PLS 1/2  y=64
    CONTROLS (knob/switch outputs):
      M=( 9,86)  X=(23,86)  Y=(37,86)  SW=(51,86)
    TO HARDWARE (inputs, right columns x=49, x=60):
      AUD 1/2  y=30    CV 1/2  y=47    PLS 1/2  y=64
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 71.12 128.5"
  width="71.12mm" height="128.5mm">

  <!-- ── Background ──────────────────────────────────────────────────── -->
  <rect width="71.12" height="128.5" fill="#3d3d3d"/>

  <!-- Subtle top-band accent -->
  <rect x="0" y="0" width="71.12" height="16" fill="#323232"/>

  <!-- ── Brand / title ─────────────────────────────────────────────── -->
  <!-- "VCV BRIDGE" centred, gold, condensed uppercase -->
  <text x="35.56" y="6.8"
        text-anchor="middle"
        font-family="'Arial Narrow', 'Helvetica Neue', Arial, sans-serif"
        font-size="4.2" font-weight="700" letter-spacing="1.6"
        fill="#d4af37">VCV BRIDGE</text>

  <!-- "music thing modular" in silver, tiny -->
  <text x="35.56" y="11.2"
        text-anchor="middle"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="2.4" letter-spacing="0.6"
        fill="#8a8a8a">MUSIC THING MODULAR</text>

  <!-- Status / RX / TX dot labels -->
  <text x="29.5" y="13.8"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="2.0" fill="#5a5a5a" letter-spacing="0.3">STS</text>
  <text x="43.5" y="13.8"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="2.0" fill="#5a5a5a" letter-spacing="0.3">RX</text>
  <text x="49.8" y="13.8"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="2.0" fill="#5a5a5a" letter-spacing="0.3">TX</text>

  <!-- ── Section headers ───────────────────────────────────────────── -->
  <!-- "FROM" on left -->
  <text x="3.5" y="20.5"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="2.8" font-weight="700" letter-spacing="0.8"
        fill="#d4af37">FROM</text>
  <!-- Arrow right → -->
  <path d="M 22,19.5 L 28,19.5 L 26.5,18.5 M 28,19.5 L 26.5,20.5"
        stroke="#d4af37" stroke-width="0.6" fill="none" stroke-linecap="round"/>

  <!-- "TO" on right -->
  <text x="57.5" y="20.5"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="2.8" font-weight="700" letter-spacing="0.8"
        fill="#d4af37">TO</text>
  <!-- Arrow left ← -->
  <path d="M 49,19.5 L 43,19.5 L 44.5,18.5 M 43,19.5 L 44.5,20.5"
        stroke="#d4af37" stroke-width="0.6" fill="none" stroke-linecap="round"/>

  <!-- Centre dividing line -->
  <line x1="35.56" y1="17" x2="35.56" y2="74"
        stroke="#555" stroke-width="0.4" stroke-dasharray="1.5,1.5"/>

  <!-- ── Column headers (1 / 2) ─────────────────────────────────────── -->
  <!-- FROM side -->
  <text x="11" y="23.5"
        text-anchor="middle"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="2.2" fill="#8a8a8a">1</text>
  <text x="22" y="23.5"
        text-anchor="middle"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="2.2" fill="#8a8a8a">2</text>
  <!-- TO side -->
  <text x="49" y="23.5"
        text-anchor="middle"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="2.2" fill="#8a8a8a">1</text>
  <text x="60" y="23.5"
        text-anchor="middle"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="2.2" fill="#8a8a8a">2</text>

  <!-- ── Row labels ─────────────────────────────────────────────────── -->
  <!-- AUD row  y=30 -->
  <text x="3" y="31.5"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="2.5" font-weight="700" letter-spacing="0.3"
        fill="#d4af37">AUD</text>

  <!-- CV row  y=47 -->
  <text x="3" y="48.5"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="2.5" font-weight="700" letter-spacing="0.3"
        fill="#d4af37">CV</text>
  <!-- Small annotation: 3kHz -->
  <text x="3" y="52.0"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="1.7" fill="#5a5a5a">3kHz</text>

  <!-- PLS row  y=64 -->
  <text x="3" y="65.5"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="2.5" font-weight="700" letter-spacing="0.3"
        fill="#d4af37">PLS</text>
  <!-- Small annotation: 48kHz -->
  <text x="3" y="69.0"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="1.7" fill="#5a5a5a">48kHz</text>

  <!-- ── Port outline guides (decorative circles matching MTM style) ── -->
  <!-- AUD FROM -->
  <circle cx="11" cy="30" r="4.2" fill="none" stroke="#555" stroke-width="0.35"/>
  <circle cx="22" cy="30" r="4.2" fill="none" stroke="#555" stroke-width="0.35"/>
  <!-- CV FROM -->
  <circle cx="11" cy="47" r="4.2" fill="none" stroke="#555" stroke-width="0.35"/>
  <circle cx="22" cy="47" r="4.2" fill="none" stroke="#555" stroke-width="0.35"/>
  <!-- PLS FROM -->
  <circle cx="11" cy="64" r="4.2" fill="none" stroke="#555" stroke-width="0.35"/>
  <circle cx="22" cy="64" r="4.2" fill="none" stroke="#555" stroke-width="0.35"/>
  <!-- AUD TO -->
  <circle cx="49" cy="30" r="4.2" fill="none" stroke="#555" stroke-width="0.35"/>
  <circle cx="60" cy="30" r="4.2" fill="none" stroke="#555" stroke-width="0.35"/>
  <!-- CV TO -->
  <circle cx="49" cy="47" r="4.2" fill="none" stroke="#555" stroke-width="0.35"/>
  <circle cx="60" cy="47" r="4.2" fill="none" stroke="#555" stroke-width="0.35"/>
  <!-- PLS TO -->
  <circle cx="49" cy="64" r="4.2" fill="none" stroke="#555" stroke-width="0.35"/>
  <circle cx="60" cy="64" r="4.2" fill="none" stroke="#555" stroke-width="0.35"/>

  <!-- ── Separator before controls section ──────────────────────────── -->
  <line x1="3" y1="75.5" x2="68" y2="75.5"
        stroke="#555" stroke-width="0.5"/>

  <!-- ── Controls row (knob & switch outputs) ──────────────────────── -->
  <text x="35.56" y="79.0"
        text-anchor="middle"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="2.2" letter-spacing="1.0"
        fill="#6a6a6a">KNOB OUTS</text>

  <!-- Knob port outlines  y=86 -->
  <circle cx=" 9" cy="86" r="4.2" fill="none" stroke="#555" stroke-width="0.35"/>
  <circle cx="23" cy="86" r="4.2" fill="none" stroke="#555" stroke-width="0.35"/>
  <circle cx="37" cy="86" r="4.2" fill="none" stroke="#555" stroke-width="0.35"/>
  <circle cx="51" cy="86" r="4.2" fill="none" stroke="#555" stroke-width="0.35"/>

  <!-- Knob labels (above ports) -->
  <text x=" 9" y="82.0"
        text-anchor="middle"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="2.5" font-weight="700" fill="#d4af37">M</text>
  <text x="23" y="82.0"
        text-anchor="middle"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="2.5" font-weight="700" fill="#d4af37">X</text>
  <text x="37" y="82.0"
        text-anchor="middle"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="2.5" font-weight="700" fill="#d4af37">Y</text>
  <text x="51" y="82.0"
        text-anchor="middle"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="2.5" font-weight="700" fill="#d4af37">SW</text>

  <!-- Small decorative arc for knob position indicator (MTM style) -->
  <path d="M 4.5,86 A 4.5,4.5 0 0 1 13.5,86"
        fill="none" stroke="#6a6a6a" stroke-width="0.4"/>
  <path d="M 18.5,86 A 4.5,4.5 0 0 1 27.5,86"
        fill="none" stroke="#6a6a6a" stroke-width="0.4"/>
  <path d="M 32.5,86 A 4.5,4.5 0 0 1 41.5,86"
        fill="none" stroke="#6a6a6a" stroke-width="0.4"/>
  <!-- Switch: small bar indicator instead of arc -->
  <line x1="47.5" y1="82.8" x2="54.5" y2="82.8"
        stroke="#5a5a5a" stroke-width="0.5"/>
  <line x1="51" y1="81.5" x2="51" y2="84.0"
        stroke="#5a5a5a" stroke-width="0.5"/>

  <!-- ── USB connection graphic (lower panel) ──────────────────────── -->
  <!-- Simple USB symbol + "USB CDC" text -->
  <text x="35.56" y="102"
        text-anchor="middle"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="2.0" letter-spacing="0.5"
        fill="#5a5a5a">USB CDC SERIAL</text>

  <!-- USB trident icon, centred at x=35.56 y=110 -->
  <!-- Stem -->
  <line x1="35.56" y1="104.5" x2="35.56" y2="110"
        stroke="#5a5a5a" stroke-width="0.5" stroke-linecap="round"/>
  <!-- Left branch -->
  <line x1="35.56" y1="107" x2="32.5" y2="107"
        stroke="#5a5a5a" stroke-width="0.5" stroke-linecap="round"/>
  <circle cx="32.5" cy="107" r="0.8" fill="none" stroke="#5a5a5a" stroke-width="0.4"/>
  <!-- Right branch -->
  <line x1="35.56" y1="107" x2="38.62" y2="107"
        stroke="#5a5a5a" stroke-width="0.5" stroke-linecap="round"/>
  <!-- Right branch square -->
  <rect x="37.8" y="106.1" width="1.6" height="1.6"
        fill="none" stroke="#5a5a5a" stroke-width="0.4"/>
  <!-- Centre top half-circle -->
  <path d="M 34.7,104.5 A 0.86,0.86 0 0 1 36.42,104.5"
        fill="none" stroke="#5a5a5a" stroke-width="0.5"/>

  <!-- ── Bottom label ───────────────────────────────────────────────── -->
  <text x="35.56" y="120"
        text-anchor="middle"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="2.0" letter-spacing="0.4"
        fill="#5a5a5a">RIGHT-CLICK TO CONNECT</text>

  <!-- ── Screw positions (visual reference; VCV adds real screws) ────── -->
  <!-- Top-left  -->
  <circle cx="3.81" cy="3.81" r="1.8" fill="#2a2a2a" stroke="#444" stroke-width="0.4"/>
  <line x1="2.5" y1="3.81" x2="5.1" y2="3.81" stroke="#555" stroke-width="0.35"/>
  <line x1="3.81" y1="2.5"  x2="3.81" y2="5.1"  stroke="#555" stroke-width="0.35"/>
  <!-- Top-right -->
  <circle cx="67.31" cy="3.81" r="1.8" fill="#2a2a2a" stroke="#444" stroke-width="0.4"/>
  <line x1="66.0"  y1="3.81" x2="68.6"  y2="3.81" stroke="#555" stroke-width="0.35"/>
  <line x1="67.31" y1="2.5"  x2="67.31" y2="5.1"  stroke="#555" stroke-width="0.35"/>
  <!-- Bottom-left -->
  <circle cx="3.81" cy="124.69" r="1.8" fill="#2a2a2a" stroke="#444" stroke-width="0.4"/>
  <line x1="2.5"  y1="124.69" x2="5.1"  y2="124.69" stroke="#555" stroke-width="0.35"/>
  <line x1="3.81" y1="123.38" x2="3.81" y2="126.0"  stroke="#555" stroke-width="0.35"/>
  <!-- Bottom-right -->
  <circle cx="67.31" cy="124.69" r="1.8" fill="#2a2a2a" stroke="#444" stroke-width="0.4"/>
  <line x1="66.0"  y1="124.69" x2="68.6"  y2="124.69" stroke="#555" stroke-width="0.35"/>
  <line x1="67.31" y1="123.38" x2="67.31" y2="126.0"  stroke="#555" stroke-width="0.35"/>

</svg>
